<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenirs | Micro Créatif</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f8f9fa;
            text-align: center;
        }
        .hero-header {
            background-color: #0056b3;
            color: white;
            padding: 60px 20px;
            position: relative;
        }
        .back-nav {
            position: absolute;
            top: 25px;
            left: 25px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }
        h1 { font-size: 3em; margin: 0; }
        .facture-img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            margin: 30px 0;
        }
        .caption {
            font-size: 1.2em;
            line-height: 1.6;
            color: #444;
            margin-bottom: 40px;
        }
        .value-comparison {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
        }
        footer {
            padding: 40px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 1.1em;
        }
        .city-divider { margin: 0 15px; color: #ccc; }
    </style>
</head>
<body>

    <header class="hero-header">
        <div class="back-nav">
            <a href="index.html" class="back-btn">← Accueil</a>
        </div>
        <h1>Nos Origines</h1>
    </header>

    <div class="container">
        <div class="caption">
            L'achat de cet <strong>Apple II Plus 48K</strong> le 11 juin 1981 pour <strong>2 100,00 $</strong> marque le début de l'aventure Micro Créatif.
            <br>
            <div class="value-comparison">
                Valeur comparative en 2026 : environ 7 350 $ CAD
            </div>
        </div>

        <img src="facture.jpg" alt="Facture originale Apple II Plus de 1981" class="facture-img">
    </div>

    <footer>
        <p>&copy; 2026 Micro Créatif. Tous droits réservés.</p>
        <p><strong>Montréal</strong> <span class="city-divider">|</span> <strong>Ho Chi Minh</strong></p>
    </footer>

</body>
</html>
