<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | Studio 3D</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        /* En-tête avec du relief et du style */
        .hero {
            background: linear-gradient(135deg, #0056b3 0%, #003d80 100%);
            color: white;
            padding: 120px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Le bouton English dans le coin supérieur droit */
        .lang-nav {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn:hover { background: white; color: #0056b3; }

        h1 { margin: 0; font-size: 4.5em; letter-spacing: -2px; }
        .tagline { font-size: 1.2em; opacity: 0.8; margin-top: 10px; font-style: italic; }

        /* Section centrale */
        .main-container {
            max-width: 800px;
            margin: -40px auto 40px; /* Chevauchement pour un look moderne */
            background: white;
            padding: 60px 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .description { font-size: 1.8em; font-weight: 300; margin-bottom: 40px; }

        .btn-souvenir {
            display: inline-block;
            background-color: #0056b3;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.3s;
        }
        .btn-souvenir:hover { background-color: #003d80; }

        footer {
            padding: 40px;
            text-align: center;
            color: #666;
            font-size: 1.1em;
        }
        .divider { margin: 0 10px; color: #0056b3; font-weight: bold; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="lang-nav">
            <button class="lang-btn" onclick="toggleLang()" id="lang-btn">English</button>
        </div>
        <h1>Micro Créatif</h1>
        <p class="tagline">L'innovation depuis 1981 | Innovation since 1981</p>
    </header>

    <div class="main-container">
        <p class="description" id="desc">Studio de développement logiciel et de design 3D.</p>
        <a href="souvenirs.html" class="btn-souvenir" id="btn-text">Découvrir notre histoire (1981)</a>
    </div>

    <footer>
        <p id="copyright">&copy; 2026 Micro Créatif. Tous droits réservés.</p>
        <p><strong>Montréal</strong> <span class="divider">|</span> <strong>Ho Chi Minh</strong></p>
    </footer>

    <script>
        function toggleLang() {
            const btn = document.getElementById('lang-btn');
            const desc = document.getElementById('desc');
            const btnText = document.getElementById('btn-text');
            const copy = document.getElementById('copyright');

            if (btn.innerText === 'English') {
                btn.innerText = 'Français';
                desc.innerText = 'Software development and 3D design studio.';
                btnText.innerText = 'Discover our history (1981)';
                copy.innerText = '© 2026 Micro Créatif. All rights reserved.';
            } else {
                btn.innerText = 'English';
                desc.innerText = 'Studio de développement logiciel et de design 3D.';
                btnText.innerText = 'Découvrir notre histoire (1981)';
                copy.innerText = '© 2026 Micro Créatif. Tous droits réservés.';
            }
        }
    </script>

</body>
</html>
