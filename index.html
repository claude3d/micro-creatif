<!DOCTYPE html>
<html lang="en">

<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 5.5 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* galaxy background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;
}

/* stars */

.star{
position:fixed;
border-radius:50%;
background:white;
z-index:-4;

box-shadow:
0 0 4px rgba(255,255,255,1),
0 0 10px rgba(255,255,255,0.9),
0 0 18px rgba(255,255,255,0.8),
0 0 28px rgba(255,255,255,0.6),
0 0 40px rgba(255,255,255,0.4);
}

.star.small{
width:2px;
height:2px;
}

.star.big{
width:3px;
height:3px;
}

.star.strong{
animation:twinkleStrong infinite;
}

.star.medium{
animation:twinkleMedium infinite;
}

.star.faint{
animation:twinkleFaint infinite;
}

@keyframes twinkleStrong{
0%{opacity:0.2; transform:scale(0.6);}
50%{opacity:1; transform:scale(2);}
100%{opacity:0.2; transform:scale(0.6);}
}

@keyframes twinkleMedium{
0%{opacity:0.4; transform:scale(0.8);}
50%{opacity:0.9; transform:scale(1.5);}
100%{opacity:0.4; transform:scale(0.8);}
}

@keyframes twinkleFaint{
0%{opacity:0.6; transform:scale(0.9);}
50%{opacity:0.85; transform:scale(1.1);}
100%{opacity:0.6; transform:scale(0.9);}
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
}

nav{
display:inline-flex;
gap:30px;
position:relative;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
cursor:pointer;
}

/* dropdown */

.dropdown{
position:relative;
}

.submenu{
display:none;
position:absolute;
top:28px;
left:0;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.3);
border-radius:10px;
padding:8px 0;
min-width:200px;
text-align:left;
}

.submenu a{
display:block;
padding:8px 14px;
font-size:16px;
}

.submenu a:hover{
background:rgba(255,255,255,0.1);
}

/* language */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* apps grid */

.apps{
padding:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.app{
width:120px;
}

.app a{
text-decoration:none;
color:white;
}

.icon{
width:100px;
height:100px;
margin:auto;
border-radius:22px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.35);
box-shadow:
0 0 0 1px white inset,
0 0 10px rgba(255,255,255,0.2);
}

.icon img{
width:100%;
display:block;
border-radius:22px;
}

.app p{
margin-top:10px;
font-size:16px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<div id="stars"></div>

<header>

<nav>

<a id="navHome" href="index.html"></a>

<div class="dropdown" id="appsDropdown">
<a id="navApps"></a>

<div class="submenu" id="appsMenu">
<a href="app1.html" id="menuApp1"></a>
<a href="app2.html" id="menuApp2"></a>
<a href="app3.html" id="menuApp3"></a>
</div>
</div>

<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>

</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">

<h1 id="title"></h1>
<p id="since"></p>

</section>

<section class="apps">

<div class="app-grid">

<div class="app">
<a href="app1.html">
<div class="icon">
<img src="images/app1.png">
</div>
<p id="app1"></p>
</a>
</div>

<div class="app">
<a href="app2.html">
<div class="icon">
<img src="images/app2.png">
</div>
<p id="app2"></p>
</a>
</div>

<div class="app">
<a href="app3.html">
<div class="icon">
<img src="images/app3.png">
</div>
<p id="app3"></p>
</a>
</div>

</div>

</section>

<footer>
<p>© Micro Créatif – v5.5</p>
<p id="cities"></p>
</footer>

<script>

/* stars */

function createStars(){

const container=document.getElementById("stars");

/* strong */

for(let i=0;i<5;i++){
let s=document.createElement("div");
s.className="star big strong";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(1.5+Math.random()*1.5)+"s";
s.style.animationDelay=(Math.random()*3)+"s";
container.appendChild(s);
}

/* medium */

for(let i=0;i<7;i++){
let s=document.createElement("div");
s.className="star small medium";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(2+Math.random()*2)+"s";
s.style.animationDelay=(Math.random()*3)+"s";
container.appendChild(s);
}

/* faint */

for(let i=0;i<6;i++){
let s=document.createElement("div");
s.className="star small faint";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*2)+"s";
s.style.animationDelay=(Math.random()*3)+"s";
container.appendChild(s);
}

}

createStars();

/* dropdown */

const dropdown=document.getElementById("appsDropdown");
const menu=document.getElementById("appsMenu");

/* desktop hover */

dropdown.addEventListener("mouseenter",()=>{menu.style.display="block";});
dropdown.addEventListener("mouseleave",()=>{menu.style.display="none";});

/* tap for tablet */

dropdown.addEventListener("click",function(e){
e.stopPropagation();
menu.style.display=(menu.style.display==="block")?"none":"block";
});

/* click outside closes */

document.addEventListener("click",function(e){
if(!dropdown.contains(e.target)){
menu.style.display="none";
}
});

</script>

<script src="js/language.js"></script>

</body>
</html>
