<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        [lang="en"] { display: none; } /* Par défaut, on cache l'anglais */
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 font-sans antialiased">

    <div class="fixed top-8 right-8 z-50">
        <button onclick="toggleLang()" class="glass px-4 py-2 rounded-full text-sm font-medium hover:bg-white/10 transition-all border border-white/20">
            <span class="lang-label">EN</span>
        </button>
    </div>

    <main class="glass p-10 md:p-16 rounded-[2.5rem] shadow-2xl max-w-xl w-full mx-4 text-center">
        <div class="mb-10">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-emerald-400 rounded-2xl mx-auto flex items-center justify-center shadow-lg rotate-3">
                <span class="text-3xl font-black text-slate-900 -rotate-3">μC</span>
            </div>
        </div>

        <div lang="fr" class="content-fr">
            <h1 class="text-4xl font-bold mb-4 tracking-tight">Micro Créatif</h1>
            <div class="h-1 w-12 bg-blue-500 mx-auto mb-8 rounded-full"></div>
            <p class="text-slate-400 text-lg leading-relaxed mb-10">
                La fusion de la <span class="text-blue-300">rigueur analytique</span> et de l'imagination pédagogique.
            </p>
            <div class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-semibold bg-blue-500/10 text-blue-400 border border-blue-500/20 mb-8">
                <span class="w-2 h-2 bg-blue-400 rounded-full mr-2 animate-pulse"></span>
                DÉVELOPPEMENT EN COURS
            </div>
        </div>

        <div lang="en" class="content-en">
            <h1 class="text-4xl font-bold mb-4 tracking-tight">Micro Creative</h1>
            <div class="h-1 w-12 bg-emerald-500 mx-auto mb-8 rounded-full"></div>
            <p class="text-slate-400 text-lg leading-relaxed mb-10">
                Fusing <span class="text-emerald-300">analytical rigor</span> with pedagogical imagination.
            </p>
            <div class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 mb-8">
                <span class="w-2 h-2 bg-emerald-400 rounded-full mr-2 animate-pulse"></span>
                UNDER DEVELOPMENT
            </div>
        </div>

        <div class="pt-8 border-t border-white/5 text-xs text-slate-500 font-mono tracking-widest uppercase">
            Montréal &bull; Ho Chi Minh Ville
        </div>
    </main>

    <script>
        function toggleLang() {
            const frElements = document.querySelectorAll('[lang="fr"]');
            const enElements = document.querySelectorAll('[lang="en"]');
            const label = document.querySelector('.lang-label');

            if (label.innerText === 'EN') {
                frElements.forEach(el => el.style.display = 'none');
                enElements.forEach(el => el.style.display = 'block');
                label.innerText = 'FR';
            } else {
                frElements.forEach(el => el.style.display = 'block');
                enElements.forEach(el => el.style.display = 'none');
                label.innerText = 'EN';
            }
        }
    </script>
</body>
</html>
