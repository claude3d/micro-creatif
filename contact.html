<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Créatif – Contact</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background-image:url("images/background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* NAVIGATION */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:20px;
font-size:18px;
box-sizing:border-box;
}

nav a{
color:white;
text-decoration:none;
cursor:pointer;
white-space:nowrap;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.submenu{
display:none;
position:absolute;
top:28px;
left:0;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

.submenu a{
display:block;
padding:6px 12px;
white-space:nowrap;
}

/* LANGUAGE BUTTON */

.lang-btn{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
font-size:18px;
white-space:nowrap;
flex-shrink:0;
}

/* MOBILE */

@media (max-width:430px){
nav{
gap:18px;
font-size:15px;
padding:14px 10px;
}
.lang-btn{
font-size:15px;
padding:4px 10px;
}
}

/* CONTENT */

.container{
margin-top:160px;
max-width:800px;
margin-left:auto;
margin-right:auto;
padding:20px;
}

h1{
font-size:48px;
margin-bottom:40px;
}

p{
font-size:20px;
line-height:1.6;
}

.email{
margin-top:30px;
font-size:24px;
font-weight:bold;
}

/* FOOTER */

footer{
margin-top:200px;
padding-bottom:40px;
font-size:14px;
opacity:0.9;
}

</style>

</head>

<body>

<nav>

<a href="index.html" id="navHome" data-en="Home" data-fr="Accueil"></a>

<div class="dropdown">

<a id="navApps" data-en="Apps" data-fr="Apps"></a>

<div class="submenu" id="appsMenu">

<a href="app1.html" data-en="RA / Dec / AZ / Alt" data-fr="AD / Déc / AZ / Alt"></a>

<a href="app2.html" data-en="Virtual Telescope" data-fr="Télescope virtuel"></a>

<a href="app3.html" data-en="Solar System" data-fr="Système solaire"></a>

</div>

</div>

<a href="about.html" id="navAbout" data-en="About" data-fr="À propos"></a>

<a href="contact.html" id="navContact" data-en="Contact" data-fr="Contact"></a>

<button onclick="toggleLanguage()" id="langButton" class="lang-btn">🌐</button>

</nav>

<div class="container">

<h1 data-en="Contact" data-fr="Contact"></h1>

<p data-en="If you have questions, want to report a bug, or need information about an application, please send an email."
data-fr="Si vous avez des questions, souhaitez signaler un bug ou obtenir des informations sur une application, veuillez envoyer un courriel."></p>

<div class="email">
contact@microcreatif.ca
</div>

</div>

<footer>

<p>© Micro Créatif</p>
<p data-en="Montreal | Ho Chi Minh City" data-fr="Montréal | Hô Chi Minh-Ville"></p>
<p>Version 1.9</p>

</footer>

<script>

/* LANGUAGE SYSTEM */

let currentLanguage = localStorage.getItem("mc_language") || "en";

function applyLanguage(){

document.querySelectorAll("[data-en]").forEach(el=>{
el.textContent = el.getAttribute("data-"+currentLanguage);
});

}

function toggleLanguage(){
currentLanguage = currentLanguage === "en" ? "fr" : "en";
localStorage.setItem("mc_language", currentLanguage);
applyLanguage();
}

document.addEventListener("DOMContentLoaded", applyLanguage);

/* APPLICATIONS DROPDOWN */

const navApps = document.getElementById("navApps");
const menu = document.getElementById("appsMenu");

navApps.onclick = function(e){
e.stopPropagation();
menu.style.display = (menu.style.display === "block") ? "none" : "block";
};

document.addEventListener("click", function(e){
if(!menu.contains(e.target) && e.target !== navApps){
menu.style.display = "none";
}
});

/* close menu before navigating */

document.querySelectorAll(".submenu a").forEach(function(link){
link.addEventListener("click", function(){
menu.style.display = "none";
});
});

</script>

</body>
</html>
