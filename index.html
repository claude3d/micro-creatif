<!DOCTYPE html>
<html lang="en">
<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 6.3 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* galaxy background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;
}

/* star layer */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-4;
}

/* stars */

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:
0 0 6px white,
0 0 12px white,
0 0 25px rgba(255,255,255,0.9);
opacity:0.2;
}

/* navigation */

header{
position:absolute;
top:14px;
width:100%;
}

nav{
display:flex;
justify-content:center;
gap:40px;
font-size:18px;
}

nav a{
color:white;
text-decoration:none;
cursor:pointer;
}

/* dropdown */

.dropdown{
position:relative;
}

.submenu{
display:none;
position:absolute;
top:26px;
left:-25px;
background:rgba(0,0,0,0.8);
padding:10px 0;
border-radius:10px;
}

.submenu a{
display:block;
padding:6px 18px;
}

/* language */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.4);
color:white;
padding:6px 14px;
border-radius:18px;
cursor:pointer;
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:10px;
}

.hero p{
font-size:22px;
}

/* apps */

.apps{
padding:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.app{
width:120px;
}

.app a{
text-decoration:none;
color:white;
}

.icon{
width:100px;
height:100px;
margin:auto;
border-radius:22px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.35);
}

.icon img{
width:100%;
display:block;
}

.app p{
margin-top:10px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">
<div id="stars"></div>

<header>

<nav>

<a id="navHome" href="index.html"></a>

<div class="dropdown" id="appsDropdown">
<a id="navApps"></a>

<div class="submenu" id="appsMenu">
<a href="app1.html" id="menuApp1"></a>
<a href="app2.html" id="menuApp2"></a>
<a href="app3.html" id="menuApp3"></a>
</div>
</div>

<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>

</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">
<h1 id="title"></h1>
<p id="since"></p>
</section>

<section class="apps">

<div class="app-grid">

<div class="app">
<a href="app1.html">
<div class="icon"><img src="images/app1.png"></div>
<p id="app1"></p>
</a>
</div>

<div class="app">
<a href="app2.html">
<div class="icon"><img src="images/app2.png"></div>
<p id="app2"></p>
</a>
</div>

<div class="app">
<a href="app3.html">
<div class="icon"><img src="images/app3.png"></div>
<p id="app3"></p>
</a>
</div>

</div>

</section>

<footer>
<p>© Micro Créatif</p>
<p id="cities"></p>
</footer>

<script>

/* dropdown */

const dropdown=document.getElementById("appsDropdown");
const menu=document.getElementById("appsMenu");

dropdown.addEventListener("click",function(e){
e.stopPropagation();
menu.style.display=(menu.style.display==="block")?"none":"block";
});

document.addEventListener("click",function(e){
if(!dropdown.contains(e.target)){
menu.style.display="none";
}
});

/* star generator */

const container=document.getElementById("stars");
const stars=[];

for(let i=0;i<120;i++){

let s=document.createElement("div");
s.className="star";

s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";

container.appendChild(s);
stars.push(s);
}

/* blinking controller */

setInterval(function(){

stars.forEach(star=>{

if(Math.random()<0.25){

star.style.opacity=Math.random();

}

});

},300);

</script>

<script src="js/language.js"></script>

</body>
</html>
