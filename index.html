<!DOCTYPE html>
<html lang="en">

<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 5.8 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* galaxy background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;
}

/* stars */

.star{
position:fixed;
width:3px;
height:3px;
border-radius:50%;
background:white;
z-index:-4;

/* strong halo */

box-shadow:
0 0 8px rgba(255,255,255,1),
0 0 20px rgba(255,255,255,0.9),
0 0 40px rgba(255,255,255,0.8),
0 0 80px rgba(255,255,255,0.6);

animation:twinkle 2s infinite ease-in-out;
}

/* star sizes */

.star.small{
width:2px;
height:2px;
}

.star.big{
width:4px;
height:4px;
}

/* twinkle speeds */

.star.fast{ animation-duration:1.4s; }
.star.medium{ animation-duration:2.2s; }
.star.slow{ animation-duration:3.2s; }

/* blinking */

@keyframes twinkle{
0%   {opacity:0.35;}
50%  {opacity:1;}
100% {opacity:0.35;}
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
}

nav{
display:inline-flex;
gap:30px;
position:relative;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
cursor:pointer;
}

/* dropdown */

.dropdown{
position:relative;
}

.submenu{
display:none;
position:absolute;
top:28px;
left:0;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.3);
border-radius:10px;
padding:8px 0;
min-width:200px;
text-align:left;
}

.submenu a{
display:block;
padding:8px 14px;
font-size:16px;
}

.submenu a:hover{
background:rgba(255,255,255,0.1);
}

/* language */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* apps */

.apps{
padding:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.app{
width:120px;
}

.app a{
text-decoration:none;
color:white;
}

.icon{
width:100px;
height:100px;
margin:auto;
border-radius:22px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.35);
box-shadow:
0 0 0 1px white inset,
0 0 10px rgba(255,255,255,0.2);
}

.icon img{
width:100%;
display:block;
border-radius:22px;
}

.app p{
margin-top:10px;
font-size:16px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<div id="stars"></div>

<header>

<nav>

<a id="navHome" href="index.html"></a>

<div class="dropdown" id="appsDropdown">
<a id="navApps"></a>

<div class="submenu" id="appsMenu">
<a href="app1.html" id="menuApp1"></a>
<a href="app2.html" id="menuApp2"></a>
<a href="app3.html" id="menuApp3"></a>
</div>
</div>

<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>

</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">

<h1 id="title"></h1>
<p id="since"></p>

</section>

<section class="apps">

<div class="app-grid">

<div class="app">
<a href="app1.html">
<div class="icon">
<img src="images/app1.png">
</div>
<p id="app1"></p>
</a>
</div>

<div class="app">
<a href="app2.html">
<div class="icon">
<img src="images/app2.png">
</div>
<p id="app2"></p>
</a>
</div>

<div class="app">
<a href="app3.html">
<div class="icon">
<img src="images/app3.png">
</div>
<p id="app3"></p>
</a>
</div>

</div>

</section>

<footer>
<p>© Micro Créatif – v5.8</p>
<p id="cities"></p>
</footer>

<script>

/* create blinking stars */

function createStars(){

const container=document.getElementById("stars");

for(let i=0;i<18;i++){

let s=document.createElement("div");

let size=Math.random()>0.5?"big":"small";

let speed;
let r=Math.random();
if(r<0.33) speed="fast";
else if(r<0.66) speed="medium";
else speed="slow";

s.className="star "+size+" "+speed;

s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";

container.appendChild(s);

}

}

createStars();

/* dropdown menu */

const dropdown=document.getElementById("appsDropdown");
const menu=document.getElementById("appsMenu");

dropdown.addEventListener("mouseenter",()=>{menu.style.display="block";});
dropdown.addEventListener("mouseleave",()=>{menu.style.display="none";});

dropdown.addEventListener("click",function(e){
e.stopPropagation();
menu.style.display=(menu.style.display==="block")?"none":"block";
});

document.addEventListener("click",function(e){
if(!dropdown.contains(e.target)){
menu.style.display="none";
}
});

</script>

<script src="js/language.js"></script>

</body>
</html>
