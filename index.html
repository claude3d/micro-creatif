<!DOCTYPE html>
<html lang="en">

<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 4.7 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;
}

/* stars */

.star{
position:fixed;
background:white;
border-radius:50%;
opacity:0.9;
animation:twinkle 2.4s infinite;
z-index:-4;

/* halo glow */
box-shadow:
0 0 4px rgba(255,255,255,0.9),
0 0 8px rgba(255,255,255,0.7),
0 0 12px rgba(255,255,255,0.4);
}

.star.big{
width:3px;
height:3px;
}

.star.small{
width:2px;
height:2px;
opacity:0.7;
}

@keyframes twinkle{
0%{opacity:0.3; transform:scale(1);}
50%{opacity:1; transform:scale(1.6);}
100%{opacity:0.3; transform:scale(1);}
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
}

nav{
display:inline-flex;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
}

/* language */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* apps */

.apps{
padding:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.app{
width:120px;
}

.app a{
text-decoration:none;
color:white;
}

/* ICON */

.icon{
width:100px;
height:100px;
margin:auto;
border-radius:22px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.35);
box-shadow:
0 0 0 1px white inset,
0 0 10px rgba(255,255,255,0.2);
}

.icon img{
width:100%;
display:block;
border-radius:22px;
}

.app p{
margin-top:10px;
font-size:16px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<!-- stars -->
<div id="stars"></div>

<header>

<nav>
<a id="navHome" href="index.html"></a>
<a id="navApps" href="apps.html"></a>
<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>
</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">

<h1 id="title"></h1>
<p id="since"></p>

</section>

<section class="apps">

<div class="app-grid">

<div class="app">
<a href="app1.html">
<div class="icon">
<img src="images/app1.png">
</div>
<p id="app1"></p>
</a>
</div>

<div class="app">
<a href="app2.html">
<div class="icon">
<img src="images/app2.png">
</div>
<p id="app2"></p>
</a>
</div>

<div class="app">
<a href="app3.html">
<div class="icon">
<img src="images/app3.png">
</div>
<p id="app3"></p>
</a>
</div>

</div>

</section>

<footer>
<p>© Micro Créatif – v4.7</p>
<p id="cities"></p>
</footer>

<script>

/* random stars */

function createStars(){

const container=document.getElementById("stars");

for(let i=0;i<35;i++){

let star=document.createElement("div");

let type=(Math.random()>0.5)?"big":"small";

star.className="star "+type;

star.style.top=Math.random()*100+"%";
star.style.left=Math.random()*100+"%";

star.style.animationDelay=(Math.random()*3)+"s";

container.appendChild(star);

}

}

createStars();

/* language system */

const text={

en:{
navHome:"Home",
navApps:"Apps",
navAbout:"About",
navContact:"Contact",
title:"Micro Creatif",
since:"Since 1981",
app1:"RA / Dec – AZ / Alt",
app2:"Virtual Telescope",
app3:"Solar System",
cities:"Montreal | Ho Chi Minh City"
},

fr:{
navHome:"Accueil",
navApps:"Applications",
navAbout:"À propos",
navContact:"Contact",
title:"Micro Créatif",
since:"Depuis 1981",
app1:"RA / Dec – AZ / Alt",
app2:"Télescope virtuel",
app3:"Système solaire",
cities:"Montréal | Hô Chi Minh Ville"
}

};

function applyLanguage(lang){

const t=text[lang];

document.getElementById("navHome").textContent=t.navHome;
document.getElementById("navApps").textContent=t.navApps;
document.getElementById("navAbout").textContent=t.navAbout;
document.getElementById("navContact").textContent=t.navContact;

document.getElementById("title").textContent=t.title;
document.getElementById("since").textContent=t.since;

document.getElementById("app1").textContent=t.app1;
document.getElementById("app2").textContent=t.app2;
document.getElementById("app3").textContent=t.app3;

document.getElementById("cities").textContent=t.cities;

document.getElementById("langButton").textContent=(lang==="en")?"FR":"EN";

}

function toggleLanguage(){

let lang=localStorage.getItem("lang")||"en";
lang=(lang==="en")?"fr":"en";

localStorage.setItem("lang",lang);

applyLanguage(lang);

}

document.addEventListener("DOMContentLoaded",function(){

let lang=localStorage.getItem("lang")||"en";
applyLanguage(lang);

});

</script>

</body>
</html>
