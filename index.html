<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | Studio 3D & Logiciel</title>
    <style>
        body {
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fond blanc pur pour l'aspect studio */
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation discrète */
        nav {
            padding: 30px 50px;
            display: flex;
            justify-content: flex-end;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid #0056b3;
            color: #0056b3;
            padding: 8px 20px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: #0056b3;
            color: white;
        }

        /* Contenu principal centré et aéré */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            margin: 0;
            color: #0056b3; /* Le bleu est ici, sur le nom */
            letter-spacing: -3px;
        }

        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .description {
            font-size: 1.8rem;
            font-weight: 200;
            max-width: 700px;
            line-height: 1.5;
            margin-bottom: 60px;
        }

        /* Bouton d'action minimaliste */
        .btn-history {
            color: #0056b3;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
            transition: opacity 0.3s;
        }

        .btn-history:hover {
            opacity: 0.6;
        }

        /* Pied de page élégant */
        footer {
            padding: 50px;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #aaa;
        }

        .cities {
            color: #1a1a1a;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <button class="lang-btn" onclick="toggleLang()" id="lang-btn">English</button>
    </nav>

    <main>
        <h1 id="title">Micro Créatif</h1>
        <p class="tagline">Innovation depuis 1981</p>
        
        <p class="description" id="desc">
            Studio de développement logiciel et de design 3D.
        </p>
        
        <a href="souvenirs.html" class="btn-history" id="btn-text">DÉCOUVRIR NOS SOUVENIRS DE 1981</a>
    </main>

    <footer>
        <p id="copyright">&copy; 2026 MICRO CRÉATIF. TOUS DROITS RÉSERVÉS.</p>
        <div class="cities">MONTRÉAL &nbsp;|&nbsp; HO CHI MINH</div>
    </footer>

    <script>
        function toggleLang() {
            const btn = document.getElementById('lang-btn');
            const desc = document.getElementById('desc');
            const btnText = document.getElementById('btn-text');
            const copy = document.getElementById('copyright');

            if (btn.innerText === 'ENGLISH') {
                btn.innerText = 'FRANÇAIS';
                desc.innerText = 'Software development and 3D design studio.';
                btnText.innerText = 'DISCOVER OUR 1981 MEMORIES';
                copy.innerText = '© 2026 MICRO CRÉATIF. ALL RIGHTS RESERVED.';
            } else {
                btn.innerText = 'ENGLISH';
                desc.innerText = 'Studio de développement logiciel et de design 3D.';
                btnText.innerText = 'DÉCOUVRIR NOS SOUVENIRS DE 1981';
                copy.innerText = '© 2026 MICRO CRÉATIF. TOUS DROITS RÉSERVÉS.';
            }
        }
    </script>

</body>
</html>
