<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
}

/* HERO WITH GALAXY IMAGE */

.hero{
height:100vh;
background-image:url("images/galaxy-background.png");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* NAVIGATION */

header{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 60px;
box-sizing:border-box;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
opacity:0.7;
}

.lang{
border:1px solid white;
padding:6px 14px;
border-radius:20px;
}

/* TITLE */

.hero h1{
font-size:64px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

/* BUTTONS */

.buttons{
margin-top:30px;
}

.buttons a{
display:inline-block;
margin:10px;
padding:14px 28px;
background:#2a7fff;
border-radius:25px;
text-decoration:none;
color:white;
}

/* APPS SECTION */

.apps{
background:black;
padding:80px 20px;
}

.apps h2{
font-size:36px;
}

.app-grid{
display:flex;
justify-content:center;
gap:80px;
margin-top:40px;
}

.app img{
width:120px;
border-radius:25px;
}

.store{
margin-top:10px;
}

.store img{
width:150px;
}

/* FOOTER */

footer{
background:black;
padding:40px;
font-size:14px;
}

</style>
</head>

<body>

<header>

<nav>
<a href="index.html">Home</a>
<a href="apps.html">Apps</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="lang">FR</div>

</header>


<section class="hero">

<h1>Micro Créatif</h1>

<p>Innovation since 1981</p>

<div class="buttons">
<a href="about.html">Discover our history</a>
<a href="apps.html">View our apps</a>
</div>

</section>


<section class="apps">

<h2>Our Apps</h2>

<div class="app-grid">

<div class="app">
<img src="images/app1.png">
<div class="store">
<img src="images/appstore-badge.png">
</div>
</div>

<div class="app">
<img src="images/app2.png">
<div class="store">
<img src="images/appstore-badge.png">
</div>
</div>

</div>

</section>


<footer>

<p>© Micro Créatif</p>
<p>Montréal | Ho Chi Minh</p>

</footer>

</body>
</html>
