<!-- Micro Creatif - index.html -->
<!-- Version 1.4 -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Creatif</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:white;
background:black;
overflow-x:hidden;
}

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("galaxy.jpg");
background-size:cover;
background-position:center;
z-index:-2;
}

/* stars */

.star{
position:fixed;
border-radius:50%;
background:white;
opacity:0;
animation:twinkle 3s infinite;
z-index:-1;
}

@keyframes twinkle{
0%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

/* navigation */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:20px;
font-size:20px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(6px);
}

nav a{
color:white;
text-decoration:none;
}

.langButton{
border:2px solid white;
padding:6px 14px;
border-radius:20px;
}

/* header */

header{
text-align:center;
padding-top:160px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

.subtitle{
font-size:28px;
opacity:0.8;
}

/* apps */

.appsTitle{
margin-top:140px;
text-align:center;
font-size:32px;
}

.apps{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:60px;
max-width:900px;
margin:60px auto;
}

.app{
text-align:center;
width:180px;
}

.app img{
width:140px;
border-radius:26px;
}

.appTitle{
margin-top:12px;
font-size:20px;
}

/* button */

.mainButton{
display:block;
margin:60px auto 120px auto;
padding:14px 40px;
font-size:22px;
border-radius:30px;
border:none;
background:rgba(100,120,255,0.6);
color:white;
backdrop-filter:blur(6px);
}

/* responsive */

@media (max-width:700px){

h1{
font-size:40px;
}

.subtitle{
font-size:22px;
}

.apps{
flex-direction:column;
align-items:center;
gap:40px;
}

}

</style>

</head>

<body>

<div class="background"></div>

<nav>
<a href="#">Home</a>
<a href="#">Apps</a>
<a href="#">About</a>
<a href="#">Contact</a>
<a class="langButton" href="#">FR</a>
</nav>

<header>
<h1 id="title"></h1>
<div class="subtitle" id="since"></div>
</header>

<div class="appsTitle" id="appsTitle"></div>

<div class="apps">

<div class="app">
<img src="radec.png">
<div class="appTitle" id="app1"></div>
</div>

<div class="app">
<img src="telescope.png">
<div class="appTitle" id="app2"></div>
</div>

<div class="app">
<img src="solarsystem.png">
<div class="appTitle" id="app3"></div>
</div>

</div>

<button class="mainButton">microcreatif.ca</button>

<script>

/* language */

const text = {

en:{
title:"Micro Creatif",
since:"Since 1981",
apps:"Our Apps",
app1:"RA / Dec – AZ / Alt",
app2:"Virtual Telescope",
app3:"Solar System"
},

fr:{
title:"Micro Créatif",
since:"Depuis 1981",
apps:"Nos Applications",
app1:"RA / Dec – AZ / Alt",
app2:"Télescope Virtuel",
app3:"Système Solaire"
}

};

let lang="en";

function updateLanguage(){

document.getElementById("title").innerText=text[lang].title;
document.getElementById("since").innerText=text[lang].since;
document.getElementById("appsTitle").innerText=text[lang].apps;

document.getElementById("app1").innerText=text[lang].app1;
document.getElementById("app2").innerText=text[lang].app2;
document.getElementById("app3").innerText=text[lang].app3;

}

updateLanguage();

/* stars */

for(let i=0;i<40;i++){

let s=document.createElement("div");
s.className="star";

let size=Math.random()*4+2;

s.style.width=size+"px";
s.style.height=size+"px";

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";

s.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(s);

}

</script>

</body>
</html>
