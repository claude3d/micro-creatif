<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En Construction / Under Construction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }
    .btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 40px;
      font-size: 20px;
      font-family: 'Georgia', serif;
      font-weight: bold;
      color: #fff;
      text-align: center;
      text-decoration: none;
      border: 2px solid rgba(180, 120, 255, 0.8);
      border-radius: 30px;
      cursor: pointer;
      white-space: nowrap;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.85) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(255, 140, 30, 0.5) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(60, 0, 120, 0.9) 0%, transparent 60%),
        linear-gradient(135deg, #1a0040 0%, #3a006e 40%, #1a0050 100%);
      box-shadow: 0 0 18px rgba(160, 80, 255, 0.7), inset 0 0 12px rgba(255, 180, 80, 0.15);
      text-shadow: 0 0 8px rgba(200, 150, 255, 0.9);
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .btn:hover {
      box-shadow: 0 0 30px rgba(180, 100, 255, 1), inset 0 0 20px rgba(255, 180, 80, 0.25);
      transform: translateX(-50%) scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/InDev.jpg" alt="Under Construction / En Construction">
    <a class="btn" href="#" onclick="history.back(); return false;">&#8592; Back / Retour</a>
  </div>
</body>
</html>
