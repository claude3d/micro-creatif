<!DOCTYPE html>
<html lang="fr">

<!-- about.html -->
<!-- Version 2.0 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souvenirs | Micro Créatif</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:white;
background:#0b0f19;
overflow-x:hidden;
}

/* Background lights */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle at 25% 30%, rgba(60,120,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,200,255,0.35), transparent 45%),
radial-gradient(circle at 40% 85%, rgba(0,120,255,0.25), transparent 45%);
animation:moveLights 20s infinite alternate ease-in-out;
filter:blur(120px);
z-index:-1;
}

@keyframes moveLights{
0%{transform:translate(-8%,-8%);}
100%{transform:translate(8%,8%);}
}

/* Navigation */

.nav-container{
position:relative;
z-index:10;
display:flex;
justify-content:space-between;
padding:30px;
}

.btn-ui{
background:rgba(255,255,255,0.1);
color:white;
border:1px solid rgba(255,255,255,0.3);
padding:10px 22px;
border-radius:25px;
cursor:pointer;
backdrop-filter:blur(10px);
text-decoration:none;
font-weight:600;
transition:all .3s;
}

.btn-ui:hover{
background:white;
color:#1a3a4a;
}

/* Main content */

.main-content{
position:relative;
z-index:5;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 40px 100px;
text-align:center;
}

h1{
font-size:3.5rem;
margin-bottom:20px;
text-shadow:0 10px 30px rgba(0,0,0,.6);
}

.caption{
font-size:1.4rem;
max-width:800px;
margin-bottom:20px;
font-weight:300;
line-height:1.4;
}

.inflation-box{
background:rgba(255,255,255,0.05);
padding:15px 30px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
margin-bottom:40px;
font-weight:600;
color:#4facfe;
}

.facture-img{
max-width:100%;
height:auto;
border-radius:10px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.2);
}

footer{
padding:40px;
text-align:center;
opacity:0.8;
font-size:1rem;
position:relative;
z-index:5;
}

</style>
</head>

<body>

<div class="nav-container">
<a href="index.html" class="btn-ui" id="back-btn"></a>
<button class="btn-ui" onclick="toggleLanguage()" id="langButton"></button>
</div>

<div class="main-content">

<h1 id="title"></h1>

<p class="caption" id="hist-text"></p>

<div class="inflation-box" id="inflation-text"></div>

<img src="images/facture.jpg" alt="Facture Apple II 1981" class="facture-img">

</div>

<footer>
<p id="copyright"></p>
<p id="cities"></p>
</footer>

<script>

/* TEXT ARRAY (same structure as index.html) */

const text = {

en:{
back:"← Home",
langButton:"FR",
title:"Our Origins",
history:"The purchase of this <strong>Apple II Plus 48K</strong> on June 11, 1981, for <strong>$2,100.00</strong> marks the beginning of the Micro Créatif adventure.",
inflation:"Comparative value in 2026: approx. $7,350 CAD",
copyright:"© 2026 Micro Créatif. All rights reserved.",
cities:"Montreal | Ho Chi Minh City"
},

fr:{
back:"← Accueil",
langButton:"EN",
title:"Nos Origines",
history:"L'achat de cet <strong>Apple II Plus 48K</strong> le 11 juin 1981 pour <strong>2 100,00 $</strong> marque le début de l'aventure Micro Créatif.",
inflation:"Valeur comparative en 2026 : environ 7 350 $ CAD",
copyright:"© 2026 Micro Créatif. Tous droits réservés.",
cities:"Montréal | Hô Chi Minh Ville"
}

};

/* Apply language */

function applyLanguage(lang){

const t = text[lang];

document.getElementById("back-btn").textContent = t.back;
document.getElementById("langButton").textContent = t.langButton;
document.getElementById("title").textContent = t.title;
document.getElementById("hist-text").innerHTML = t.history;
document.getElementById("inflation-text").textContent = t.inflation;
document.getElementById("copyright").textContent = t.copyright;
document.getElementById("cities").textContent = t.cities;

}

/* Toggle language */

function toggleLanguage(){

let lang = localStorage.getItem("lang") || "fr";
lang = (lang === "fr") ? "en" : "fr";

localStorage.setItem("lang", lang);

applyLanguage(lang);

}

/* Init */

document.addEventListener("DOMContentLoaded",function(){

let lang = localStorage.getItem("lang") || "fr";

applyLanguage(lang);

});

</script>

</body>
</html>
