<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Creatif</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
color:white;
background:black;
overflow-x:hidden;
}

/* Background */

.hero{
height:100vh;
background:url("galaxy.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* Navigation */

.navbar{
position:absolute;
top:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
font-size:18px;
}

.navbar a{
color:white;
text-decoration:none;
opacity:0.9;
}

.navbar a:hover{
opacity:1;
}

/* Dropdown */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:30px;
left:-40px;
background:rgba(0,0,0,0.85);
border-radius:10px;
padding:10px 0;
min-width:200px;
backdrop-filter:blur(6px);
}

.dropdown-content a{
display:block;
padding:10px 20px;
white-space:nowrap;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* Title */

h1{
font-size:72px;
margin:0;
}

.subtitle{
margin-top:10px;
font-size:20px;
opacity:0.9;
}

/* Button */

.button{
margin-top:40px;
padding:14px 30px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.5);
background:rgba(255,255,255,0.15);
color:white;
font-size:16px;
text-decoration:none;
backdrop-filter:blur(4px);
}

.button:hover{
background:rgba(255,255,255,0.25);
}

/* Apps section */

.apps{
text-align:center;
padding:80px 20px;
}

.app-icons{
display:flex;
justify-content:center;
gap:60px;
margin-top:30px;
flex-wrap:wrap;
}

.app{
text-align:center;
}

.app img{
width:120px;
border-radius:24px;
}

footer{
text-align:center;
opacity:0.6;
padding:40px 0;
font-size:14px;
}

</style>
</head>
