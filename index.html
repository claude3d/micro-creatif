<!-- Micro Creatif -->
<!-- index.html -->
<!-- Version 2.5 -->

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Creatif</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

/* BACKGROUND */

body{
background-image:url("images/galaxy.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* NAVBAR */

nav{
position:fixed;
top:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
font-size:20px;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
}

.lang{
border:2px solid white;
padding:6px 14px;
border-radius:20px;
cursor:pointer;
}

/* MAIN */

.main{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* TITLE */

h1{
font-size:60px;
margin:10px 0;
}

.subtitle{
font-size:26px;
opacity:0.85;
margin-bottom:40px;
}

/* APPS */

.appsTitle{
font-size:28px;
margin-bottom:25px;
}

.apps{
display:flex;
gap:60px;
justify-content:center;
flex-wrap:wrap;
}

.app{
width:170px;
}

.app img{
width:130px;
border-radius:24px;
}

.appTitle{
margin-top:10px;
font-size:20px;
}

/* BUTTON */

.mainButton{
margin-top:40px;
padding:14px 40px;
font-size:22px;
border-radius:30px;
border:none;
background:rgba(100,120,255,0.6);
color:white;
backdrop-filter:blur(6px);
}

/* STARS */

.star{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
box-shadow:0 0 8px 2px rgba(255,255,255,0.9);
animation:blink infinite;
}

@keyframes blink{
0%{opacity:1; transform:scale(1);}
50%{opacity:0.2; transform:scale(0.6);}
100%{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">Apps</a>
<a href="#">About</a>
<a href="#">Contact</a>
<a class="lang" id="langBtn">FR</a>
</nav>

<div class="main">

<h1 id="title"></h1>
<div class="subtitle" id="since"></div>

<div class="appsTitle" id="appsTitle"></div>

<div class="apps">

<div class="app">
<img src="images/radec.png" alt="RA Dec">
<div class="appTitle">RA / Dec – AZ / Alt</div>
</div>

<div class="app">
<img src="images/telescope.png" alt="Virtual Telescope">
<div class="appTitle">Virtual Telescope</div>
</div>

<div class="app">
<img src="images/solarsystem.png" alt="Solar System">
<div class="appTitle">Solar System</div>
</div>

</div>

<button class="mainButton">microcreatif.ca</button>

</div>

<script>

/* LANGUAGE ARRAY */

const text = {

en:{
title:"Micro Creatif",
since:"Since 1981",
apps:"Our Apps"
},

fr:{
title:"Micro Créatif",
since:"Depuis 1981",
apps:"Nos Applications"
}

};

let lang="en";

/* APPLY TEXT */

function updateLanguage(){

document.getElementById("title").innerText=text[lang].title;
document.getElementById("since").innerText=text[lang].since;
document.getElementById("appsTitle").innerText=text[lang].apps;

}

updateLanguage();

/* LANGUAGE BUTTON */

document.getElementById("langBtn").onclick=function(){

if(lang==="en"){
lang="fr";
this.innerText="EN";
}else{
lang="en";
this.innerText="FR";
}

updateLanguage();

}

/* STARS */

function star(x,y,d){

let s=document.createElement("div");
s.className="star";
s.style.left=x+"%";
s.style.top=y+"%";
s.style.animationDuration=d+"s";

document.body.appendChild(s);

}

/* STAR POSITIONS */

star(10,18,1.4);
star(28,42,2.3);
star(48,26,1.8);
star(65,32,2.6);
star(80,55,1.5);
star(22,70,2.1);
star(60,82,1.9);
star(40,60,2.4);

</script>

</body>
</html>
