<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* galaxy background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
text-align:center;
}

nav{
display:inline-flex;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
transition:opacity 0.2s;
}

nav a:hover{
opacity:1;
}

/* language toggle */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.6);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
backdrop-filter:blur(12px);
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
margin-top:0;
opacity:0.9;
}

/* glass buttons */

.buttons{
display:flex;
gap:24px;
margin-top:28px;
}

.buttons a{

padding:14px 30px;
border-radius:28px;

color:white;
text-decoration:none;
font-size:17px;

background:linear-gradient(
rgba(255,255,255,0.25),
rgba(255,255,255,0.05)
);

border:1px solid rgba(255,255,255,0.5);

backdrop-filter:blur(16px);

box-shadow:
0 8px 30px rgba(0,0,0,0.35),
inset 0 1px 1px rgba(255,255,255,0.6);

transition:all 0.25s;

}

.buttons a:hover{

transform:translateY(-3px);

background:linear-gradient(
rgba(255,255,255,0.35),
rgba(255,255,255,0.10)
);

box-shadow:
0 12px 40px rgba(0,0,0,0.45),
inset 0 1px 2px rgba(255,255,255,0.7);

}

/* apps section */

.apps{
padding:10px 20px;
margin-top:10px;
}

.apps h2{
margin-bottom:30px;
}

.app-grid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

/* individual app */

.app{
text-align:center;
animation:float 6s ease-in-out infinite;
}

.app:nth-child(2){
animation-delay:1s;
}

.app:nth-child(3){
animation-delay:2s;
}

.app img{
width:120px;
border-radius:26px;
transition:transform 0.25s, box-shadow 0.25s;
box-shadow:0 8px 30px rgba(0,0,0,0.6);
}

.app img:hover{
transform:scale(1.1);
box-shadow:
0 0 20px rgba(255,255,255,0.5),
0 0 40px rgba(255,255,255,0.2);
}

.app a{
text-decoration:none;
color:white;
}

.app p{
margin-top:10px;
font-size:16px;
}

/* floating animation */

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}

/* footer */

footer{
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<header>

<nav>
<a id="navHome" href="index.html"></a>
<a id="navApps" href="apps.html"></a>
<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>
</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">

<h1 id="title"></h1>
<p id="since"></p>

<div class="buttons">
<a id="btnHistory" href="about.html"></a>
<a id="btnApps" href="apps.html"></a>
</div>

</section>

<section class="apps">

<h2 id="appsTitle"></h2>

<div class="app-grid">

<div class="app">
<a href="app1.html">
<img src="images/app1.png">
<p id="app1"></p>
</a>
</div>

<div class="app">
<a href="app2.html">
<img src="images/app2.png">
<p id="app2"></p>
</a>
</div>

<div class="app">
<a href="app3.html">
<img src="images/app3.png">
<p id="app3"></p>
</a>
</div>

</div>

</section>

<footer>
<p>© Micro Créatif</p>
<p id="cities"></p>
</footer>

<script>

const text={

en:{
navHome:"Home",
navApps:"Apps",
navAbout:"About",
navContact:"Contact",
title:"Micro Creatif",
since:"Since 1981",
history:"Discover our history",
viewApps:"View our apps",
appsTitle:"Our Apps",
app1:"RA / Dec – AZ / Alt",
app2:"Virtual Telescope",
app3:"Solar System",
cities:"Montreal | Ho Chi Minh City"
},

fr:{
navHome:"Accueil",
navApps:"Applications",
navAbout:"À propos",
navContact:"Contact",
title:"Micro Créatif",
since:"Depuis 1981",
history:"Découvrez notre histoire",
viewApps:"Voir nos applications",
appsTitle:"Nos applications",
app1:"RA / Dec – AZ / Alt",
app2:"Télescope virtuel",
app3:"Système solaire",
cities:"Montréal | Hô Chi Minh Ville"
}

};

function applyLanguage(lang){

const t=text[lang];

document.getElementById("navHome").textContent=t.navHome;
document.getElementById("navApps").textContent=t.navApps;
document.getElementById("navAbout").textContent=t.navAbout;
document.getElementById("navContact").textContent=t.navContact;

document.getElementById("title").textContent=t.title;
document.getElementById("since").textContent=t.since;

document.getElementById("btnHistory").textContent=t.history;
document.getElementById("btnApps").textContent=t.viewApps;

document.getElementById("appsTitle").textContent=t.appsTitle;

document.getElementById("app1").textContent=t.app1;
document.getElementById("app2").textContent=t.app2;
document.getElementById("app3").textContent=t.app3;

document.getElementById("cities").textContent=t.cities;

document.getElementById("langButton").textContent=(lang==="en")?"FR":"EN";

}

function toggleLanguage(){

let lang=localStorage.getItem("lang")||"en";
lang=(lang==="en")?"fr":"en";

localStorage.setItem("lang",lang);

applyLanguage(lang);

}

document.addEventListener("DOMContentLoaded",function(){

let lang=localStorage.getItem("lang")||"en";
applyLanguage(lang);

});

</script>

</body>
</html>
