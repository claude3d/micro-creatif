<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | En construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100-vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-200 font-sans">

    <main class="glass p-12 rounded-3xl shadow-2xl max-w-lg w-full mx-4 text-center">
        <div class="mb-8">
            <span class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                μC
            </span>
        </div>

        <h1 class="text-3xl font-bold mb-4">Micro Créatif</h1>
        
        <div class="h-1 w-12 bg-blue-500 mx-auto mb-6 rounded-full"></div>

        <p class="text-slate-400 leading-relaxed mb-8">
            Fusion de la <span class="text-blue-300">rigueur analytique</span> et de l'imagination pédagogique. Quelque chose de nouveau se prépare ici.
        </p>

        <div class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-500/10 text-blue-400 border border-blue-500/20 mb-10">
            <span class="w-2 h-2 bg-blue-500 rounded-full mr-2 animate-pulse"></span>
            Développement en cours
        </div>

        <div class="text-sm text-slate-500 font-mono">
            Prochainement : Montréal &bull; Ho Chi Minh Ville
        </div>
    </main>

</body>
</html>
