<!DOCTYPE html>
<html lang="en">

<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 4.1 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* galaxy background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.2;
animation:twinkle 1.5s infinite;
z-index:-2;
}

@keyframes twinkle{
0%{opacity:0.15; transform:scale(1);}
50%{opacity:1; transform:scale(1.6);}
100%{opacity:0.15; transform:scale(1);}
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
text-align:center;
}

nav{
display:inline-flex;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
}

/* language button */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* buttons */

.buttons{
display:flex;
gap:24px;
margin-top:28px;
}

.buttons a{
padding:14px 30px;
border-radius:28px;
color:white;
text-decoration:none;
font-size:17px;
background:linear-gradient(
rgba(255,255,255,0.25),
rgba(255,255,255,0.05)
);
border:1px solid rgba(255,255,255,0.35);
backdrop-filter:blur(16px);
}

/* apps */

.apps{
padding:20px;
margin-top:10px;
}

.app-grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

/* APP CARD */

.app{

width:180px;
padding:20px;

border-radius:26px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.25);

backdrop-filter:blur(20px);

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

transition:transform .25s;

}

.app:hover{
transform:translateY(-6px);
}

/* icon */

.icon{

width:100px;
height:100px;

margin:auto;

border-radius:22px;

overflow:hidden;

box-shadow:
0 0 12px rgba(255,255,255,0.2),
0 0 24px rgba(255,255,255,0.1);

}

.icon img{

width:108%;
border-radius:22px;

display:block;

}

.app a{
text-decoration:none;
color:white;
}

.app p{
margin-top:12px;
font-size:16px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<!-- stars -->

<div class="star" style="top:12%; left:18%; animation-delay:0s;"></div>
<div class="star" style="top:22%; left:72%; animation-delay:1s;"></div>
<div class="star" style="top:35%; left:40%; animation-delay:2s;"></div>
<div class="star" style="top:48%; left:80%; animation-delay:0.5s;"></div>
<div class="star" style="top:60%; left:15%; animation-delay:1.5s;"></div>
<div class="star" style="top:75%; left:50%; animation-delay:2.5s;"></div>
<div class="star" style="top:18%; left:55%; animation-delay:0.8s;"></div>
<div class="star" style="top:30%; left:85%; animation-delay:1.8s;"></div>
<div class="star" style="top:52%; left:33%; animation-delay:2.2s;"></div>
<div class="star" style="top:66%; left:70%; animation-delay:0.3s;"></div>
<div class="star" style="top:82%; left:25%; animation-delay:1.3s;"></div>
<div class="star" style="top:40%; left:60%; animation-delay:2.7s;"></div>

<header>

<nav>
<a id="navHome" href="index.html"></a>
<a id="navApps" href="apps.html"></a>
<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>
</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">

<h1 id="title"></h1>
<p id="since"></p>

<div class="buttons">
<a id="btnHistory" href="about.html"></a>
<a id="btnApps" href="apps.html"></a>
</div>

</section>

<section class="apps">

<h2 id="appsTitle"></h2>

<div class="app-grid">

<div class="app">
<a href="app1.html">
<div class="icon">
<img src="images/app1.png">
</div>
<p id="app1"></p>
</a>
</div>

<div class="app">
<a href="app2.html">
<div class="icon">
<img src="images/app2.png">
</div>
<p id="app2"></p>
</a>
</div>

<div class="app">
<a href="app3.html">
<div class="icon">
<img src="images/app3.png">
</div>
<p id="app3"></p>
</a>
</div>

</div>

</section>

<footer>
<p>© Micro Créatif – v4.1</p>
<p id="cities"></p>
</footer>

<script>

const text={

en:{
navHome:"Home",
navApps:"Apps",
navAbout:"About",
navContact:"Contact",
title:"Micro Creatif",
since:"Since 1981",
history:"Discover our history",
viewApps:"View our apps",
appsTitle:"Our Apps",
app1:"RA / Dec – AZ / Alt",
app2:"Virtual Telescope",
app3:"Solar System",
cities:"Montreal | Ho Chi Minh City"
},

fr:{
navHome:"Accueil",
navApps:"Applications",
navAbout:"À propos",
navContact:"Contact",
title:"Micro Créatif",
since:"Depuis 1981",
history:"Découvrez notre histoire",
viewApps:"Voir nos applications",
appsTitle:"Nos applications",
app1:"RA / Dec – AZ / Alt",
app2:"Télescope virtuel",
app3:"Système solaire",
cities:"Montréal | Hô Chi Minh Ville"
}

};

function applyLanguage(lang){

const t=text[lang];

document.getElementById("navHome").textContent=t.navHome;
document.getElementById("navApps").textContent=t.navApps;
document.getElementById("navAbout").textContent=t.navAbout;
document.getElementById("navContact").textContent=t.navContact;

document.getElementById("title").textContent=t.title;
document.getElementById("since").textContent=t.since;

document.getElementById("btnHistory").textContent=t.history;
document.getElementById("btnApps").textContent=t.viewApps;

document.getElementById("appsTitle").textContent=t.appsTitle;

document.getElementById("app1").textContent=t.app1;
document.getElementById("app2").textContent=t.app2;
document.getElementById("app3").textContent=t.app3;

document.getElementById("cities").textContent=t.cities;

document.getElementById("langButton").textContent=(lang==="en")?"FR":"EN";

}

function toggleLanguage(){

let lang=localStorage.getItem("lang")||"en";
lang=(lang==="en")?"fr":"en";

localStorage.setItem("lang",lang);

applyLanguage(lang);

}

document.addEventListener("DOMContentLoaded",function(){

let lang=localStorage.getItem("lang")||"en";
applyLanguage(lang);

});

</script>

</body>
</html>
