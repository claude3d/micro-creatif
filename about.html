<!-- Micro Créatif -->
<!-- about.html -->
<!-- Version 1.2 -->

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:#0a0f1c;
overflow-x:hidden;
}

/* soft background similar spirit to index but no galaxy */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 25% 30%, rgba(0,140,255,0.35), transparent 50%),
radial-gradient(circle at 70% 60%, rgba(0,200,255,0.25), transparent 55%),
radial-gradient(circle at 50% 80%, rgba(0,90,200,0.25), transparent 60%);
z-index:-5;
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:center;
}

nav{
display:inline-flex;
gap:30px;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
}

/* language */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
}

/* page container */

.container{
max-width:900px;
margin:auto;
padding-top:120px;
padding-left:20px;
padding-right:20px;
}

/* title */

h1{
font-size:56px;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
opacity:0.9;
margin-bottom:30px;
}

/* facture image */

.facture{
margin-top:30px;
}

.facture img{
max-width:100%;
border-radius:10px;
border:1px solid rgba(255,255,255,0.35);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* info box */

.info{
margin-top:25px;
padding:14px 20px;
border-radius:20px;
display:inline-block;
background:linear-gradient(
rgba(255,255,255,0.25),
rgba(255,255,255,0.05)
);
border:1px solid rgba(255,255,255,0.35);
backdrop-filter:blur(16px);
font-size:17px;
}

/* footer */

footer{
margin-top:80px;
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<div class="bg"></div>

<header>

<nav>
<a id="navHome" href="index.html"></a>
<a id="navApps" href="apps.html"></a>
<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>
</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<div class="container">

<h1 id="title"></h1>

<p class="subtitle" id="subtitle"></p>

<div class="facture">
<img src="images/facture.jpg" alt="Apple II facture">
</div>

<div class="info" id="inflation"></div>

</div>

<footer>
<p>© Micro Créatif</p>
<p id="cities"></p>
</footer>

<script>

const text={

en:{
navHome:"Home",
navApps:"Apps",
navAbout:"About",
navContact:"Contact",

title:"Our Origins",
subtitle:"The purchase of an Apple II Plus computer in June 1981 started the Micro Créatif adventure.",

inflation:"$2,100 in 1981 ≈ about $7,350 CAD in 2026",

cities:"Montreal | Ho Chi Minh City"
},

fr:{
navHome:"Accueil",
navApps:"Applications",
navAbout:"À propos",
navContact:"Contact",

title:"Nos Origines",
subtitle:"L'achat d'un ordinateur Apple II Plus en juin 1981 marque le début de l'aventure Micro Créatif.",

inflation:"2 100 $ en 1981 ≈ environ 7 350 $ CAD en 2026",

cities:"Montréal | Hô Chi Minh Ville"
}

};

function applyLanguage(lang){

const t=text[lang];

document.getElementById("navHome").textContent=t.navHome;
document.getElementById("navApps").textContent=t.navApps;
document.getElementById("navAbout").textContent=t.navAbout;
document.getElementById("navContact").textContent=t.navContact;

document.getElementById("title").textContent=t.title;
document.getElementById("subtitle").textContent=t.subtitle;
document.getElementById("inflation").textContent=t.inflation;

document.getElementById("cities").textContent=t.cities;

document.getElementById("langButton").textContent=(lang==="en")?"FR":"EN";

}

function toggleLanguage(){

let lang=localStorage.getItem("lang")||"en";
lang=(lang==="en")?"fr":"en";

localStorage.setItem("lang",lang);

applyLanguage(lang);

}

document.addEventListener("DOMContentLoaded",function(){

let lang=localStorage.getItem("lang")||"en";
applyLanguage(lang);

});

</script>

</body>
</html>
