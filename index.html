<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Creatif</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
color:white;
overflow-x:hidden;
background:url("images/galaxy.jpg") center/cover no-repeat fixed;
}

/* NAVBAR */

.navbar{
position:absolute;
top:25px;
width:100%;
display:flex;
justify-content:center;
gap:50px;
font-size:18px;
z-index:10;
}

.navbar a{
color:white;
text-decoration:none;
opacity:0.9;
}

.navbar a:hover{
opacity:1;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:30px;
left:-30px;
background:rgba(0,0,0,0.85);
border-radius:10px;
padding:10px 0;
min-width:220px;
backdrop-filter:blur(6px);
}

.dropdown-content a{
display:block;
padding:10px 20px;
white-space:nowrap;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h1{
font-size:72px;
margin:0;
}

.subtitle{
margin-top:12px;
font-size:20px;
opacity:0.9;
}

/* APPS */

.apps{
text-align:center;
padding:60px 20px 80px;
}

.apps h2{
margin-bottom:30px;
}

.app-icons{
display:flex;
justify-content:center;
gap:70px;
flex-wrap:wrap;
}

.app{
text-align:center;
}

.app img{
width:120px;
border-radius:22px;
transition:transform 0.25s;
}

.app img:hover{
transform:scale(1.1);
}

.app-title{
margin-top:10px;
}

/* FOOTER */

footer{
text-align:center;
opacity:0.6;
padding:40px 0;
font-size:14px;
}

</style>
</head>

<body>

</div>

</div>

</nav>
