<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 2.4 -->

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
}

/* galaxy background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-sizing:border-box;
}

/* navigation */

nav{
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
}

/* language button */

.lang button{
background:#2a7fff;
border:none;
color:white;
padding:6px 14px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

/* hero */

.hero{
height:55vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:5px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* buttons */

.buttons{
margin-top:20px;
}

.buttons a{
display:inline-block;
margin:8px;
padding:14px 28px;
background:#2a7fff;
border-radius:25px;
text-decoration:none;
color:white;
font-size:16px;
}

/* apps */

.apps{
padding:10px 20px;
margin-top:-40px;
}

.apps h2{
margin-bottom:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:70px;
}

.app img{
width:120px;
border-radius:25px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<header>

<nav>
<a id="navHome" href="index.html"></a>
<a id="navApps" href="apps.html"></a>
<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>
</nav>

<div class="lang">
<button onclick="toggleLanguage()" id="langButton">FR</button>
</div>

</header>

<section class="hero">

<h1 id="title"></h1>
<p id="since"></p>

<div class="buttons">
<a id="btnHistory" href="about.html"></a>
<a id="btnApps" href="apps.html"></a>
</div>

</section>

<section class="apps">

<h2 id="appsTitle"></h2>

<div class="app-grid">

<div class="app">
<img src="images/app1.png">
</div>

<div class="app">
<img src="images/app1.png">
</div>

</div>

</section>

<footer>
<p>© Micro Créatif</p>
<p id="cities"></p>
</footer>

<script>

const text = {

en:{
navHome:"Home",
navApps:"Apps",
navAbout:"About",
navContact:"Contact",
title:"Micro Creatif",
since:"Since 1981",
history:"Discover our history",
viewApps:"View our apps",
appsTitle:"Our Apps",
cities:"Montreal | Ho Chi Minh City"
},

fr:{
navHome:"Accueil",
navApps:"Applications",
navAbout:"À propos",
navContact:"Contact",
title:"Micro Créatif",
since:"Depuis 1981",
history:"Découvrez notre histoire",
viewApps:"Voir nos applications",
appsTitle:"Nos applications",
cities:"Montréal | Hô Chi Minh Ville"
}

};

function applyLanguage(lang){

const t=text[lang];

document.getElementById("navHome").textContent=t.navHome;
document.getElementById("navApps").textContent=t.navApps;
document.getElementById("navAbout").textContent=t.navAbout;
document.getElementById("navContact").textContent=t.navContact;

document.getElementById("title").textContent=t.title;
document.getElementById("since").textContent=t.since;

document.getElementById("btnHistory").textContent=t.history;
document.getElementById("btnApps").textContent=t.viewApps;

document.getElementById("appsTitle").textContent=t.appsTitle;

document.getElementById("cities").textContent=t.cities;

document.getElementById("langButton").textContent=(lang==="en")?"FR":"EN";

}

function toggleLanguage(){

let lang=localStorage.getItem("lang") || "en";
lang=(lang==="en")?"fr":"en";

localStorage.setItem("lang",lang);

applyLanguage(lang);

}

document.addEventListener("DOMContentLoaded",function(){

let lang=localStorage.getItem("lang") || "en";

applyLanguage(lang);

});

</script>

</body>
</html>
