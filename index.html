<!DOCTYPE html>
<html lang="en">

<!-- Micro Créatif -->
<!-- index.html -->
<!-- Version 4.6 -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;
}

/* stars */

.star{
position:fixed;
background:white;
border-radius:50%;
z-index:-4;

box-shadow:
0 0 6px white,
0 0 12px white,
0 0 24px rgba(255,255,255,0.9),
0 0 50px rgba(255,255,255,0.7);

animation:twinkle 1.6s infinite ease-in-out;
}

.star.big{
width:3px;
height:3px;
}

.star.small{
width:2px;
height:2px;
}

@keyframes twinkle{
0%{opacity:0.35; transform:scale(1);}
50%{opacity:1; transform:scale(1.5);}
100%{opacity:0.35; transform:scale(1);}
}

/* header */

header{
position:absolute;
top:10px;
width:100%;
}

nav{
display:inline-flex;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
opacity:0.9;
}

/* language */

.lang{
position:absolute;
right:30px;
top:0;
}

.lang button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.3);
color:white;
padding:6px 14px;
border-radius:16px;
cursor:pointer;
}

/* hero */

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:8px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* apps */

.apps{
padding:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:60px;
flex-wrap:wrap;
}

.app{
width:120px;
}

.app a{
text-decoration:none;
color:white;
}

.icon{
width:100px;
height:100px;
margin:auto;
border-radius:22px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.35);

box-shadow:
0 0 0 1px white inset,
0 0 10px rgba(255,255,255,0.2);
}

.icon img{
width:100%;
display:block;
border-radius:22px;
}

.app p{
margin-top:10px;
font-size:16px;
}

/* footer */

footer{
padding:20px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<!-- blinking stars -->

<div class="star big" style="top:18%;left:70%;animation-delay:0.8s;"></div>
<div class="star big" style="top:30%;left:40%;animation-delay:1.6s;"></div>
<div class="star big" style="top:50%;left:80%;animation-delay:0.4s;"></div>
<div class="star big" style="top:62%;left:15%;animation-delay:1.2s;"></div>
<div class="star big" style="top:75%;left:55%;animation-delay:2s;"></div>
<div class="star big" style="top:85%;left:30%;animation-delay:1.4s;"></div>
<div class="star big" style="top:42%;left:60%;animation-delay:2.3s;"></div>
<div class="star big" style="top:66%;left:72%;animation-delay:0.9s;"></div>
<div class="star big" style="top:28%;left:85%;animation-delay:1.8s;"></div>

<div class="star small" style="top:14%;left:10%;animation-delay:0.5s;"></div>
<div class="star small" style="top:22%;left:45%;animation-delay:1.1s;"></div>
<div class="star small" style="top:34%;left:60%;animation-delay:2.2s;"></div>
<div class="star small" style="top:46%;left:25%;animation-delay:0.7s;"></div>
<div class="star small" style="top:58%;left:40%;animation-delay:1.5s;"></div>
<div class="star small" style="top:64%;left:90%;animation-delay:2.4s;"></div>
<div class="star small" style="top:72%;left:10%;animation-delay:1.3s;"></div>
<div class="star small" style="top:82%;left:65%;animation-delay:0.6s;"></div>
<div class="star small" style="top:90%;left:50%;animation-delay:2.1s;"></div>

<header>

<nav>

</div>

</body>
</html>
