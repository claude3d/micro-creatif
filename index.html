<!-- Micro Creatif Website -->
<!-- index.html -->
<!-- Version: v4.10 -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Creatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:url("images/galaxy-background.png") center/cover no-repeat fixed;
}

/* NAVBAR */

.navbar{
position:absolute;
top:30px;
width:100%;
display:flex;
justify-content:center;
gap:60px;
font-size:18px;
}

.navbar a{
color:white;
text-decoration:none;
opacity:0.9;
}

.navbar a:hover{
opacity:1;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:28px;
left:-40px;
background:rgba(0,0,0,0.85);
border-radius:10px;
padding:10px 0;
min-width:220px;
}

.dropdown-content a{
display:block;
padding:10px 20px;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* HERO */

.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:72px;
margin:0;
}

.subtitle{
margin-top:10px;
font-size:22px;
opacity:0.9;
}

/* APPS */

.apps{
padding-bottom:80px;
}

.apps h2{
margin-bottom:30px;
}

.app-icons{
display:flex;
justify-content:center;
gap:70px;
flex-wrap:wrap;
}

.app{
text-align:center;
}

.app img{
width:120px;
border-radius:22px;
transition:transform .25s;
}

.app img:hover{
transform:scale(1.1);
}

.app-title{
margin-top:10px;
}

/* FOOTER */

footer{
margin-top:40px;
opacity:0.6;
font-size:14px;
}

</style>

</head>

<body>

<nav class="navbar">

<a href="index.html" id="navHome"></a>

<div class="dropdown">

<a href="#" id="navApps"></a>

<div class="dropdown-content">

<a href="ra-dec.html">RA / Dec – AZ / Alt</a>
<a href="virtual-telescope.html">Virtual Telescope</a>
<a href="solar-system.html">Solar System</a>

</div>

</div>

<a href="about.html" id="navAbout"></a>
<a href="contact.html" id="navContact"></a>

</nav>


<section class="hero">

<h1>Micro Creatif</h1>
<div class="subtitle">Since 1981</div>

</section>


<section class="apps">

<h2 id="appsTitle"></h2>

<div class="app-icons">

<div class="app">
<a href="ra-dec.html">
<img src="images/app1.png">
</a>
<div class="app-title">RA / Dec – AZ / Alt</div>
</div>

<div class="app">
<a href="virtual-telescope.html">
<img src="images/app2.png">
</a>
<div class="app-title">Virtual Telescope</div>
</div>

<div class="app">
<a href="solar-system.html">
<img src="images/app3.png">
</a>
<div class="app-title">Solar System</div>
</div>

</div>

</section>


<footer>

<div id="footerText"></div>

</footer>


<script>

/* LANGUAGE SYSTEM */

const text = {

EN:{
navHome:"Home",
navApps:"Apps",
navAbout:"About",
navContact:"Contact",
appsTitle:"Our Apps",
footer:"© Micro Créatif – v4.10<br>Montreal | Ho Chi Minh City"
},

FR:{
navHome:"Accueil",
navApps:"Apps",
navAbout:"À propos",
navContact:"Contact",
appsTitle:"Nos Apps",
footer:"© Micro Créatif – v4.10<br>Montréal | Hô Chi Minh Ville"
}

};

let lang="EN";

document.getElementById("navHome").innerHTML=text[lang].navHome;
document.getElementById("navApps").innerHTML=text[lang].navApps;
document.getElementById("navAbout").innerHTML=text[lang].navAbout;
document.getElementById("navContact").innerHTML=text[lang].navContact;
document.getElementById("appsTitle").innerHTML=text[lang].appsTitle;
document.getElementById("footerText").innerHTML=text[lang].footer;

</script>


</body>
</html>
