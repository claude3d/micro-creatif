<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Créatif - Contact</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
background:black;
text-align:center;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

nav{
position:absolute;
top:20px;
width:100%;
text-align:center;
}

nav a{
color:white;
margin:0 20px;
text-decoration:none;
font-size:18px;
opacity:0.9;
}

nav a:hover{
opacity:1;
}

#langButton{
position:absolute;
right:30px;
top:20px;
border:1px solid white;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
}

.container{
margin-top:200px;
max-width:700px;
margin-left:auto;
margin-right:auto;
padding:20px;
}

h1{
font-size:48px;
margin-bottom:30px;
}

p{
font-size:22px;
line-height:1.6;
}

.email{
margin-top:40px;
font-size:26px;
}

.email a{
color:white;
text-decoration:none;
border-bottom:1px solid white;
}

.email a:hover{
opacity:0.8;
}

footer{
position:absolute;
bottom:40px;
width:100%;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<nav>
<a id="navHome" href="index.html"></a>
<a id="navApps" href="index.html#apps"></a>
<a id="navAbout" href="about.html"></a>
<a id="navContact" href="contact.html"></a>

<span id="langButton" onclick="toggleLanguage()">EN</span>
</nav>

<div class="container">

<h1 id="title"></h1>

<p id="message"></p>

<div class="email">
<a href="mailto:contact@microcreatif.ca">contact@microcreatif.ca</a>
</div>

</div>

<footer>
<div>© Micro Créatif – v1.0</div>
<div id="cities"></div>
</footer>

<script src="js/language.js"></script>

<script>

const textContact = {

en:{
title:"Contact",
message:"If you have questions, need information about the applications, or would like to report a bug, please send an email using your own mail system to the address below."
},

fr:{
title:"Contact",
message:"Si vous avez des questions, souhaitez signaler un bogue ou obtenir des informations sur les applications, veuillez envoyer un courriel en utilisant votre propre système de messagerie à l'adresse ci-dessous."
}

};

function applyContactLanguage(lang){

const t=textContact[lang];

document.getElementById("title").textContent=t.title;
document.getElementById("message").textContent=t.message;

}

document.addEventListener("DOMContentLoaded",function(){

let lang=localStorage.getItem("lang") || "en";

applyLanguage(lang);
applyContactLanguage(lang);

});

function toggleLanguage(){

let lang=localStorage.getItem("lang") || "en";
lang = (lang==="en") ? "fr" : "en";

localStorage.setItem("lang",lang);

applyLanguage(lang);
applyContactLanguage(lang);

}

</script>

<script>

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);

}

drawStars();

</script>

</body>
</html>
