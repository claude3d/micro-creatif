<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Créatif – Contact</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

/* Background image */

background-image:url("images/background.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* Navigation bar */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:20px;
font-size:18px;
}

nav a{
color:white;
text-decoration:none;
opacity:0.9;
}

nav a:hover{
opacity:1;
}

/* Language button */

.langButton{
position:absolute;
right:30px;
top:15px;
padding:6px 14px;
border:1px solid rgba(255,255,255,0.6);
border-radius:20px;
cursor:pointer;
font-size:14px;
}

/* Content */

.container{
margin-top:160px;
max-width:800px;
margin-left:auto;
margin-right:auto;
padding:20px;
}

h1{
font-size:48px;
margin-bottom:40px;
}

p{
font-size:20px;
line-height:1.6;
}

.email{
margin-top:30px;
font-size:22px;
font-weight:bold;
}

/* Footer */

footer{
margin-top:200px;
padding-bottom:40px;
font-size:14px;
opacity:0.9;
}

</style>

<script>

let currentLanguage = localStorage.getItem("mc_language") || "en";

function applyLanguage(){

if(currentLanguage==="fr"){

document.getElementById("navHome").textContent="Accueil";
document.getElementById("navApps").textContent="Applications";
document.getElementById("navAbout").textContent="À propos";
document.getElementById("navContact").textContent="Contact";

document.getElementById("title").textContent="Contact";

document.getElementById("text1").textContent="Si vous avez des questions, souhaitez signaler un bug ou obtenir des informations sur une application, veuillez envoyer un courriel.";

document.getElementById("text2").textContent="Veuillez écrire en utilisant votre propre application de courriel.";

document.getElementById("langButton").textContent="EN";

}else{

document.getElementById("navHome").textContent="Home";
document.getElementById("navApps").textContent="Apps";
document.getElementById("navAbout").textContent="About";
document.getElementById("navContact").textContent="Contact";

document.getElementById("title").textContent="Contact";

document.getElementById("text1").textContent="If you have questions, want to report a bug, or need information about an application, please send an email.";

document.getElementById("text2").textContent="Please write using your own email application.";

document.getElementById("langButton").textContent="FR";

}

}

function toggleLanguage(){

currentLanguage = currentLanguage==="en" ? "fr" : "en";

localStorage.setItem("mc_language",currentLanguage);

applyLanguage();

}

window.onload=applyLanguage;

</script>

</head>

<body>

<nav>

<a href="index.html" id="navHome">Home</a>
<a href="apps.html" id="navApps">Apps</a>
<a href="about.html" id="navAbout">About</a>
<a href="contact.html" id="navContact">Contact</a>

<div class="langButton" id="langButton" onclick="toggleLanguage()">FR</div>

</nav>

<div class="container">

<h1 id="title">Contact</h1>

<p id="text1">
If you have questions, want to report a bug, or need information about an application, please send an email.
</p>

<p id="text2">
Please write using your own email application.
</p>

<div class="email">
contact@microcreatif.ca
</div>

</div>

<footer>

<p>© Micro Créatif</p>
<p>Montréal | Hồ Chí Minh-Ville</p>
<p>Version 1.2</p>

</footer>

</body>
</html>
