<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | Accueil</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }
        /* Grand bandeau bleu d'hier */
        .hero-blue {
            background-color: #0056b3;
            color: white;
            padding: 80px 20px;
            text-align: center;
            position: relative; /* Pour positionner le bouton par rapport à ce bloc */
        }
        /* Le bouton English en haut à droite */
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-btn {
            background-color: white;
            color: #0056b3;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
        }
        h1 { margin: 0; font-size: 3.5em; }
        .tagline { font-style: italic; font-size: 1.2em; margin-top: 15px; opacity: 0.9; }
        
        /* Section principale */
        .main-content {
            padding: 60px 20px;
            text-align: center;
        }
        .description { font-size: 1.3em; margin-bottom: 40px; }

        /* Bouton vers la page historique */
        .btn-history {
            display: inline-block;
            background-color: #0056b3;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.3s;
        }
        .btn-history:hover { background-color: #004494; }

        footer {
            text-align: center;
            padding: 40px;
            color: #777;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header class="hero-blue">
        <div class="lang-container">
            <button class="lang-btn" onclick="translatePage()" id="lang-btn">English</button>
        </div>
        <h1 id="main-title">Micro Créatif</h1>
        <p class="tagline" id="tagline">L'innovation depuis 1981 | Innovation since 1981</p>
    </header>

    <main class="main-content">
        <p class="description" id="desc">Studio de développement logiciel et de design 3D.</p>
        
        <a href="souvenirs.html" class="btn-history" id="btn-hist">Voir nos souvenirs de 1981</a>
    </main>

    <footer>
        <p>&copy; 2026 Micro Créatif. Tous droits réservés.</p>
        <p>2322 Avenue d'Orléans, Montréal, QC</p>
    </footer>

    <script>
        function translatePage() {
            const btn = document.getElementById('lang-btn');
            const desc = document.getElementById('desc');
            const btnHist = document.getElementById('btn-hist');

            if (btn.innerText === 'English') {
                btn.innerText = 'Français';
                desc.innerText = 'Software development and 3D design studio.';
                btnHist.innerText = 'View our 1981 memories';
            } else {
                btn.innerText = 'English';
                desc.innerText = 'Studio de développement logiciel et de design 3D.';
                btnHist.innerText = 'Voir nos souvenirs de 1981';
            }
        }
    </script>

</body>
</html>
