<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En Construction / Under Construction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
    }
    .btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 40px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      text-align: center;
      text-decoration: none;
      border: 2px solid #fff;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/InDev.jpg" alt="Under Construction / En Construction">
    <a class="btn" href="#" onclick="history.back(); return false;">&#8592; Back / Retour</a>
  </div>
</body>
</html>
