<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Créatif</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;
background:black;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* NAVIGATION */

header{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:center;
}

nav a{
color:white;
margin:0 18px;
text-decoration:none;
font-size:18px;
}

/* HERO */

.hero{
height:55vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:64px;
margin-bottom:5px;
}

.hero p{
font-size:22px;
margin-top:0;
}

/* BUTTONS */

.buttons{
margin-top:20px;
}

.buttons a{
display:inline-block;
margin:8px;
padding:14px 28px;
background:#2a7fff;
border-radius:25px;
text-decoration:none;
color:white;
font-size:16px;
}

/* APPS */

.apps{
padding:10px 20px;
margin-top:-40px;
}

.apps h2{
margin-bottom:20px;
}

.app-grid{
display:flex;
justify-content:center;
gap:70px;
}

.app img{
width:120px;
border-radius:25px;
}

/* FOOTER */

footer{
padding:20px;
font-size:14px;
}

</style>
</head>

<body>

<img class="bg" src="images/galaxy-background.png">

<header>
<nav>
<a href="index.html">Home</a>
<a href="apps.html">Apps</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">

<h1>Micro Créatif</h1>
<p>Since 1981</p>

<div class="buttons">
<a href="about.html">Discover our history</a>
<a href="apps.html">View our apps</a>
</div>

</section>

<section class="apps">

<h2>Our Apps</h2>

<div class="app-grid">

<div class="app">
<img src="images/app1.png">
</div>

<div class="app">
<img src="images/app1.png">
</div>

</div>

</section>

<footer>
<p>© Micro Créatif</p>
<p>Montréal | Ho Chi Minh City</p>
</footer>

</body>
</html>
