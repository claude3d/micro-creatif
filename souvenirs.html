<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenirs | Micro Créatif</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f8f9fa;
            text-align: center;
        }
        .hero-header {
            background-color: #0056b3;
            color: white;
            padding: 80px 20px;
            position: relative;
        }
        /* Navigation retour à gauche */
        .back-nav {
            position: absolute;
            top: 25px;
            left: 25px;
        }
        /* Bouton de langue à droite */
        .lang-nav {
            position: absolute;
            top: 25px;
            right: 25px;
        }
        .btn-ui {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-ui:hover {
            background-color: white;
            color: #0056b3;
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }
        h1 { font-size: 3.5em; margin: 0; }
        .facture-img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            margin: 30px 0;
        }
        .caption {
            font-size: 1.3em;
            line-height: 1.6;
            color: #444;
            margin-bottom: 20px;
        }
        .value-comparison {
            background-color: #e9ecef;
            padding: 15px 25px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            color: #0056b3;
        }
        footer {
            margin-top: 60px;
            padding: 40px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 1.1em;
        }
        .city-divider { margin: 0 15px; color: #ccc; }
    </style>
</head>
<body>

    <header class="hero-header">
        <div class="back-nav">
            <a href="index.html" class="btn-ui" id="back-btn">← Accueil</a>
        </div>
        <div class="lang-nav">
            <button class="btn-ui" onclick="toggleLanguage()" id="lang-btn">English</button>
        </div>
        <h1 id="page-title">Nos Origines</h1>
    </header>

    <div class="container">
        <p class="caption" id="history-text">
            L'achat de cet <strong>Apple II Plus 48K</strong> le 11 juin 1981 pour <strong>2 100,00 $</strong> marque le début de l'aventure Micro Créatif.
        </p>
        
        <div class="value-comparison" id="inflation-text">
            Valeur comparative en 2026 : environ 7 350 $ CAD
        </div>

        <img src="facture.jpg" alt="Facture originale Apple II Plus de 1981" class="facture-img">
    </div>

    <footer>
        <p id="copyright">&copy; 2026 Micro Créatif. Tous droits réservés.</p>
        <p><strong>Montréal</strong> <span class="city-divider">|</span> <strong>Ho Chi Minh</strong></p>
    </footer>

    <script>
        function toggleLanguage() {
            const btn = document.getElementById('lang-btn');
            const backBtn = document.getElementById('back-btn');
            const title = document.getElementById('page-title');
            const history = document.getElementById('history-text');
            const inflation = document.getElementById('inflation-text');
            const copy = document.getElementById('copyright');

            if (btn.innerText === 'English') {
                btn.innerText = 'Français';
                backBtn.innerText = '← Home';
                title.innerText = 'Our Origins';
                history.innerHTML = 'The purchase of this <strong>Apple II Plus 48K</strong> on June 11, 1981, for <strong>$2,100.00</strong> marks the beginning of the Micro Créatif adventure.';
                inflation.innerText = 'Comparative value in 2026: approx. $7,350 CAD';
                copy.innerText = '© 2026 Micro Créatif. All rights reserved.';
            } else {
                btn.innerText = 'English';
                backBtn.innerText = '← Accueil';
                title.innerText = 'Nos Origines';
                history.innerHTML = "L'achat de cet <strong>Apple II Plus 48K</strong> le 11 juin 1981 pour <strong>2 100,00 $</strong> marque le début de l'aventure Micro Créatif.";
                inflation.innerText = 'Valeur comparative en 2026 : environ 7 350 $ CAD';
                copy.innerText = '© 2026 Micro Créatif. Tous droits réservés.';
            }
        }
    </script>

</body>
</html>
