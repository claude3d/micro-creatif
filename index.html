<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | Studio 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* On crée un environnement global bleu profond et pro */
        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #0056b3 0%, #002d5e 100%);
            color: white;
            overflow: hidden; /* Pour un look "app" de studio 3D */
        }

        /* Le bouton English dans le coin supérieur droit */
        .lang-nav {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .lang-btn:hover { background: white; color: #0056b3; }

        /* Conteneur principal centré verticalement et horizontalement */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 6rem; /* Très gros titre pour l'impact 3D */
            font-weight: 800;
            letter-spacing: -4px;
            margin-bottom: 5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 1.4rem;
            font-style: italic;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .description {
            font-size: 2rem;
            font-weight: 200;
            max-width: 800px;
            margin-bottom: 60px;
            line-height: 1.2;
        }

        /* Bouton blanc pour trancher sur le bleu */
        .btn-history {
            display: inline-block;
            background-color: white;
            color: #0056b3;
            padding: 20px 50px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .btn-history:hover { transform: scale(1.05); }

        footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="lang-nav">
        <button class="lang-btn" onclick="toggleLang()" id="lang-btn">English</button>
    </div>

    <div class="main-content">
        <h1 id="title">Micro Créatif</h1>
        <p class="tagline">L'innovation depuis 1981 | Innovation since 1981</p>
        
        <p class="description" id="desc">
            Studio de développement logiciel et de design 3D.
        </p>
        
        <a href="souvenirs.html" class="btn-history" id="btn-text">Découvrir notre histoire</a>
    </div>

    <footer>
        <p id="copyright">&copy; 2026 Micro Créatif. Tous droits réservés.</p>
        <p><strong>Montréal</strong> &nbsp;|&nbsp; <strong>Ho Chi Minh</strong></p>
    </footer>

    <script>
        function toggleLang() {
            const btn = document.getElementById('lang-btn');
            const desc = document.getElementById('desc');
            const btnText = document.getElementById('btn-text');
            const copy = document.getElementById('copyright');

            if (btn.innerText === 'English') {
                btn.innerText = 'Français';
                desc.innerText = 'Software development and 3D design studio.';
                btnText.innerText = 'Discover our history';
                copy.innerText = '© 2026 Micro Créatif. All rights reserved.';
            } else {
                btn.innerText = 'English';
                desc.innerText = 'Studio de développement logiciel et de design 3D.';
                btnText.innerText = 'Découvrir notre histoire';
                copy.innerText = '© 2026 Micro Créatif. Tous droits réservés.';
            }
        }
    </script>

</body>
</html>
