<!-- Micro Creatif -->
<!-- index.html -->
<!-- Version 3.3 -->

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Micro Creatif</title>

<style>

/* ---------- GLOBAL ---------- */

html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

/* ---------- BACKGROUND ---------- */

body{
background-image:url("images/galaxy-background.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ---------- NAVBAR ---------- */

nav{
position:fixed;
top:25px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
font-size:20px;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
}

.langButton{
border:2px solid white;
padding:6px 14px;
border-radius:20px;
cursor:pointer;
}

/* ---------- MAIN LAYOUT ---------- */

.main{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* ---------- TITLE ---------- */

h1{
font-size:64px;
margin:10px 0;
}

.subtitle{
font-size:28px;
opacity:0.9;
margin-bottom:60px;
}

/* ---------- APPS ---------- */

.appsTitle{
font-size:32px;
margin-bottom:30px;
}

.apps{
display:flex;
gap:70px;
justify-content:center;
flex-wrap:wrap;
}

.app{
width:180px;
}

.app img{
width:140px;
border-radius:26px;
}

.appTitle{
margin-top:12px;
font-size:20px;
}

/* ---------- BUTTON ---------- */

.mainButton{
margin-top:50px;
padding:16px 44px;
font-size:22px;
border-radius:30px;
border:none;
background:rgba(120,140,255,0.7);
color:white;
backdrop-filter:blur(6px);
}

/* ---------- STARS ---------- */

.star{
position:fixed;
background:white;
border-radius:50%;
box-shadow:0 0 10px 3px rgba(255,255,255,0.9);
animation:blink infinite;
}

@keyframes blink{
0%{opacity:1; transform:scale(1);}
50%{opacity:0.15; transform:scale(0.5);}
100%{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<nav>

<a href="#">Home</a>
<a href="#">Apps</a>
<a href="#">About</a>
<a href="#">Contact</a>

<a class="langButton" id="langBtn">FR</a>

</nav>

<div class="main">

<h1 id="title"></h1>
<div class="subtitle" id="since"></div>

<div class="appsTitle" id="appsTitle"></div>

<div class="apps">

<div class="app">
<img src="images/app1.png">
<div class="appTitle" id="app1"></div>
</div>

<div class="app">
<img src="images/app2.png">
<div class="appTitle" id="app2"></div>
</div>

<div class="app">
<img src="images/app3.png">
<div class="appTitle" id="app3"></div>
</div>

</div>

<button class="mainButton">microcreatif.ca</button>

</div>

<script>

/* ---------- LANGUAGE ARRAY ---------- */

const text = {

en:{
title:"Micro Creatif",
since:"Since 1981",
apps:"Our Apps",
app1:"RA / Dec – AZ / Alt",
app2:"Virtual Telescope",
app3:"Solar System"
},

fr:{
title:"Micro Créatif",
since:"Depuis 1981",
apps:"Nos Applications",
app1:"RA / Dec – AZ / Alt",
app2:"Télescope Virtuel",
app3:"Système Solaire"
}

};

let lang="en";

/* ---------- APPLY LANGUAGE ---------- */

function updateLanguage(){

document.getElementById("title").innerText=text[lang].title;
document.getElementById("since").innerText=text[lang].since;
document.getElementById("appsTitle").innerText=text[lang].apps;

document.getElementById("app1").innerText=text[lang].app1;
document.getElementById("app2").innerText=text[lang].app2;
document.getElementById("app3").innerText=text[lang].app3;

}

updateLanguage();

/* ---------- LANGUAGE BUTTON ---------- */

document.getElementById("langBtn").onclick=function(){

if(lang==="en"){
lang="fr";
this.innerText="EN";
}
else{
lang="en";
this.innerText="FR";
}

updateLanguage();

}

/* ---------- STAR SYSTEM ---------- */

function createStar(x,y,d,size){

let s=document.createElement("div");

s.className="star";
s.style.left=x+"%";
s.style.top=y+"%";
s.style.animationDuration=d+"s";
s.style.width=size+"px";
s.style.height=size+"px";

document.body.appendChild(s);

}

/* star positions */

createStar(8,18,1.6,3);
createStar(22,35,2.2,6);
createStar(30,70,1.9,4);
createStar(40,25,2.4,7);
createStar(55,45,1.8,3);
createStar(65,20,2.6,5);
createStar(72,65,2.1,6);
createStar(85,30,1.7,4);
createStar(92,55,2.3,7);
createStar(50,80,1.9,3);

</script>

</body>
</html>
