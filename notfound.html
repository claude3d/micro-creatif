<!-- MicroCreatif Under Construction Page - Version 1.1 -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroCreatif - Under Construction</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        overflow: hidden;
        color: white;
        background: radial-gradient(circle at center, #050510, #000000);
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        padding: 20px;
    }

    h1 {
        font-size: 2.4em;
        margin-bottom: 20px;
    }

    p {
        font-size: 1.2em;
        max-width: 650px;
        margin: auto;
        line-height: 1.6em;
    }

    .button {
        margin-top: 30px;
        padding: 12px 25px;
        font-size: 1em;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #1e90ff;
        color: white;
    }

    .workers {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        font-size: 42px;
    }

    .bridge {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 4px;
        background: linear-gradient(to right, #888, transparent);
        box-shadow: 0 0 12px #0ff;
        animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
        from { opacity: 0.5; }
        to { opacity: 1; }
    }

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="bridge"></div>

<div class="container">
    <h1 id="title"></h1>
    <p id="text"></p>
    <button class="button" onclick="goHome()" id="btn"></button>
</div>

<div class="workers">
    👨‍🚀 👽 👾
</div>

<script>
// Language system
let lang = "en";

const textContent = {
    en: {
        title: "🚧 Under Construction",
        text: "This page is currently under construction… somewhere between galaxies.<br>Our crew is building a new connection across the universe.<br>Come back soon — it will be worth the trip.",
        btn: "Back to Home"
    },
    fr: {
        title: "🚧 En construction",
        text: "Cette page est actuellement en construction… quelque part entre les galaxies.<br>Notre équipe construit un nouveau passage à travers l’univers.<br>Revenez bientôt — le voyage en vaudra la peine.",
        btn: "Retour à l’accueil"
    }
};

function updateText() {
    document.getElementById("title").innerHTML = textContent[lang].title;
    document.getElementById("text").innerHTML = textContent[lang].text;
    document.getElementById("btn").innerHTML = textContent[lang].btn;
}

// Toggle language on double click
document.body.addEventListener("dblclick", () => {
    lang = (lang === "en") ? "fr" : "en";
    updateText();
});

function goHome() {
    window.location.href = "/";
}

updateText();

// STAR ANIMATION
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();

        s.y += 0.2;
        if (s.y > canvas.height) s.y = 0;
    });

    requestAnimationFrame(drawStars);
}

drawStars();

</script>

</body>
</html>
