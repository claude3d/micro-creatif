<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Créatif | Studio 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f0f4f8; /* Un gris très clair bleuté, pas blanc hôpital */
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Barre de navigation invisible pour le bouton English */
        nav {
            width: 100%;
            padding: 25px 40px;
            display: flex;
            justify-content: flex-end;
            position: absolute;
            top: 0;
        }

        .lang-btn {
            background: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-btn:hover { background: #004494; }

        /* Contenu centré sur toute la page sans coupure */
        .wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 4.5rem;
            color: #0056b3;
            letter-spacing: -2px;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 40px;
        }

        .description {
            font-size: 1.8rem;
            font-weight: 300;
            max-width: 800px;
            margin-bottom: 50px;
            line-height: 1.4;
        }

        /* Bouton "Découvrir notre histoire" sans le 1981 */
        .btn-history {
            display: inline-block;
            background-color: #0056b3;
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.3);
            transition: transform 0.2s;
        }

        .btn-history:hover {
            transform: translateY(-3px);
            background-color: #004494;
        }

        footer {
            padding: 40px;
            font-size: 1.1em;
            color: #7f8c8d;
            text-align: center;
        }

        .cities {
            color: #0056b3;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <nav>
        <button class="lang-btn" onclick="toggleLanguage()" id="lang-btn">English</button>
    </nav>

    <div class="wrapper">
        <h1 id="title">Micro Créatif</h1>
        <p class="tagline">L'innovation depuis 1981 | Innovation since 1981</p>
        
        <p class="description" id="desc">
            Studio de développement logiciel et de design 3D.
        </p>
        
        <a href="souvenirs.html" class="btn-history" id="btn-text">Découvrir notre histoire</a>
    </div>

    <footer>
        <p id="copyright">&copy; 2026 Micro Créatif. Tous droits réservés.</p>
        <div class="cities">MONTRÉAL &nbsp;|&nbsp; HO CHI MINH</div>
    </footer>

    <script>
        function toggleLanguage() {
            const btn = document.getElementById('lang-btn');
            const desc = document.getElementById('desc');
            const btnText = document.getElementById('btn-text');
            const copy = document.getElementById('copyright');

            if (btn.innerText === 'English') {
                btn.innerText = 'Français';
                desc.innerText = 'Software development and 3D design studio.';
                btnText.innerText = 'Discover our history';
                copy.innerText = '© 2026 Micro Créatif. All rights reserved.';
            } else {
                btn.innerText = 'English';
                desc.innerText = 'Studio de développement logiciel et de design 3D.';
                btnText.innerText = 'Découvrir notre histoire';
                copy.innerText = '© 2026 Micro Créatif. Tous droits réservés.';
            }
        }
    </script>

</body>
</html>
